<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animei</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="./css/app.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header__left">
            <button class="icon-btn menu-btn" aria-label="Menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        <div class="header__logo">Animei</div>
        <div class="header__right">
            <div class="profile-wrap">
                <button class="icon-btn profile-btn" aria-label="Profile">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <div class="profile-menu" id="profile-menu">
                    <a href="#" id="logout-btn">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="hub">
        <a href="./pages/study.html" class="hub-card">
            <div class="hub-card__icon hub-card__icon--study">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <div class="hub-card__info">
                Study
                <span class="hub-card__subtitle">Daily spaced repetition</span>
            </div>
        </a>
        <a href="./pages/custom-study.html" class="hub-card">
            <div class="hub-card__icon hub-card__icon--custom">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
            </div>
            <div class="hub-card__info">
                Custom Study
                <span class="hub-card__subtitle">Review all words</span>
            </div>
        </a>
        <a href="./pages/watch.html" class="hub-card">
            <div class="hub-card__icon" style="background: rgba(245, 158, 11, 0.15); color: var(--warning);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
            <div class="hub-card__info">
                Watch
                <span class="hub-card__subtitle">Learn from anime videos</span>
            </div>
        </a>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar__brand">Animei</div>
        <a href="./index.html" class="active">Home</a>
        <a href="./pages/watch.html">Watch</a>
        <a href="./pages/words.html">Dictionary</a>
        <a href="./pages/feedback.html">Feedback</a>
    </nav>
    <div class="overlay" id="overlay"></div>
</div>

<script src="./libs/axios/axios.min.js"></script>
<script src="./libs/snackbar/snackbar.js"></script>
<script src="./js/axiosClient.js"></script>
<script src="./js/app.js"></script>
</body>
</html>
