<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animei - Dictionary</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../css/app.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header__left">
            <button class="icon-btn menu-btn" aria-label="Menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
        </div>
        <div class="header__logo">Animei</div>
        <div class="header__right">
            <div class="profile-wrap">
                <button class="icon-btn profile-btn" aria-label="Profile">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
                <div class="profile-menu" id="profile-menu">
                    <a href="#" id="logout-btn">Logout</a>
                </div>
            </div>
        </div>
    </header>

    <div class="dictionary">
        <h2 class="dictionary__title">
            <span data-i18n="words.title">Словарь</span>
            <span class="dictionary__count" id="words-count" hidden></span>
        </h2>
        <div class="words-toolbar">
            <label class="words-filter">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="words-filter" autocomplete="off" data-i18n-placeholder="words.filter" placeholder="Поиск по слову или переводу…">
            </label>
            <div class="words-toolbar__actions">
                <button class="btn btn--ghost" id="export-btn" data-i18n="words.export" data-i18n-title="words.export.title" title="Файл подходит для Anki и как резервная копия">Скачать слова</button>
                <button class="btn btn--ghost" id="import-btn" data-i18n="words.import">Загрузить из файла</button>
                <input type="file" id="import-file" accept=".txt,.tsv,.csv" hidden>
            </div>
        </div>
        <div class="words-list"></div>
    </div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar__brand">Animei</div>
        <div class="sidebar__version">v51</div>
        <a href="../index.html" data-i18n="nav.home">Главная</a>
        <a href="./catalog.html" data-i18n="nav.catalog">Каталог</a>
        <a href="./watch.html" data-i18n="nav.watch">Своё видео</a>
        <a href="./words.html" class="active" data-i18n="nav.dictionary">Словарь</a>
        <a href="./feedback.html" data-i18n="nav.feedback">Обратная связь</a>
    </nav>
    <div class="overlay" id="overlay"></div>
</div>

<script src="../libs/axios/axios.min.js"></script>
<script src="../libs/snackbar/snackbar.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/axiosClient.js"></script>
<script src="../js/video-store.js"></script>
<script src="../js/words-store.js"></script>
<script src="../js/app.js"></script>
<script src="../js/words.js"></script>
<script src="../js/stats.js"></script>
</body>
</html>
