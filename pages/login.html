<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animei - Login</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../css/app.css" rel="stylesheet">
</head>
<body>
<div class="app">
    <header class="header">
        <div class="header__left"></div>
        <div class="header__logo">Animei</div>
        <div class="header__right"></div>
    </header>

    <main class="main">
        <div class="login-form">
            <h2 class="login-form__title">Welcome back</h2>
            <p class="login-form__subtitle">Sign in to continue learning</p>
            <form>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password">
                </div>
                <button type="button" id="submit-btn" class="btn btn--primary btn--block" style="margin-top: 8px;">
                    Sign In
                </button>
            </form>
        </div>
    </main>
</div>

<script src="../libs/axios/axios.min.js"></script>
<script src="../libs/snackbar/snackbar.js"></script>
<script src="../js/axiosClient.js"></script>
<script src="../js/app.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
