<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер — Animei</title>
    <link rel="manifest" href="../manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="../css/app.css" rel="stylesheet">
    <link href="../css/player.css" rel="stylesheet">
</head>
<body>
<div class="app player-app">
    <header class="header">
        <div class="header__left">
            <a href="./catalog.html" class="icon-btn" aria-label="Каталог">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
            </a>
        </div>
        <div class="header__logo" id="anime-title">Загрузка…</div>
        <div class="header__right"></div>
    </header>

    <main class="player-layout">
        <section class="player-main">
            <div class="video-wrap" id="video-wrap">
                <video id="video" playsinline></video>
                <div class="video-loading" id="video-loading">Загружаем видео…</div>

                <!-- Своё управление видео вместо стандартного браузерного -->
                <div class="player-ui" id="player-ui">
                    <button class="player-ui__bigplay" id="big-play" aria-label="Играть">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v13.72c0 .8.87 1.3 1.55.88l10.8-6.86a1.04 1.04 0 0 0 0-1.76L9.55 4.26A1.04 1.04 0 0 0 8 5.14z"/></svg>
                    </button>
                    <div class="player-ui__bottom">
                        <div class="player-ui__seek" id="seek">
                            <div class="player-ui__seek-buffered" id="seek-buffered"></div>
                            <div class="player-ui__seek-fill" id="seek-fill"><div class="player-ui__seek-knob"></div></div>
                        </div>
                        <div class="player-ui__row">
                            <button class="player-ui__btn" id="ctrl-play" data-i18n-title="ui.play.title" title="Играть/пауза (Space)"></button>
                            <div class="player-ui__vol">
                                <button class="player-ui__btn" id="ctrl-mute" data-i18n-title="ui.mute.title" title="Звук (M)"></button>
                                <input type="range" id="ctrl-volume" min="0" max="1" step="0.05" value="1" aria-label="Громкость">
                            </div>
                            <span class="player-ui__time" id="ctrl-time">0:00 / 0:00</span>
                            <div class="player-ui__spacer"></div>
                            <button class="player-ui__speed" id="ctrl-speed" data-i18n-title="ui.speed.title" title="Скорость воспроизведения">1×</button>
                            <button class="player-ui__btn" id="ctrl-fs" data-i18n-title="ui.fs.title" title="Во весь экран (F)"></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="now-cue" id="now-cue" hidden>
                <div class="now-cue__jp" id="now-cue-jp"></div>
                <div class="now-cue__romaji" id="now-cue-romaji"></div>
                <div class="now-cue__ru" id="now-cue-ru"></div>
            </div>

            <!-- На телефоне блок настроек можно свернуть, чтобы субтитры были сразу под видео -->
            <button class="controls-toggle" id="controls-toggle" type="button" aria-expanded="true">
                <svg class="controls-toggle__gear" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span data-i18n="controls.settings">Настройки видео</span>
                <svg class="controls-toggle__chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>

            <div class="player-controls" id="player-controls">
                <div class="control-group control-group--season" id="season-group" hidden>
                    <label data-i18n="controls.season">Сезон</label>
                    <select id="season-select"></select>
                </div>
                <div class="control-group">
                    <label data-i18n="controls.translation">Перевод</label>
                    <select id="translation-select"></select>
                </div>
                <div class="control-group">
                    <label data-i18n="controls.episode">Серия</label>
                    <select id="episode-select"></select>
                </div>
                <div class="control-group control-group--offset">
                    <label><span data-i18n="controls.offset">Сдвиг сабов</span> <span id="offset-value">0.0s</span></label>
                    <div class="offset-buttons">
                        <button id="offset-minus" class="chip-btn" data-i18n-title="controls.earlier.title" title="Показывать сабы на полсекунды раньше">−0.5</button>
                        <button id="offset-zero" class="chip-btn" data-i18n-title="controls.reset.title" title="Убрать сдвиг">0</button>
                        <button id="offset-plus" class="chip-btn" data-i18n-title="controls.later.title" title="Показывать сабы на полсекунды позже">+0.5</button>
                        <button id="offset-sync" class="chip-btn chip-btn--accent" data-i18n="controls.now" data-i18n-title="controls.now.title" title="Считать, что текущая реплика должна звучать прямо сейчас">Сейчас!</button>
                    </div>
                </div>
                <div class="control-group">
                    <label data-i18n="controls.mode">Режим</label>
                    <div class="offset-buttons">
                        <button id="autopause-btn" class="chip-btn" data-i18n="controls.autopause" data-i18n-title="controls.autopause.title" title="Пауза после каждой реплики (S)">⏸ Авто-пауза</button>
                        <button id="ru-toggle" class="chip-btn chip-btn--active" data-i18n-title="controls.ru.title" title="Показывать перевод в списке субтитров">RU</button>
                        <button id="furigana-toggle" class="chip-btn chip-btn--active" data-i18n-title="controls.furigana.title" title="Показывать чтения над иероглифами">あ</button>
                        <button id="romaji-toggle" class="chip-btn" data-i18n-title="controls.romaji.title" title="Показывать транскрипцию латиницей (ромадзи) — если пока не читаешь хирагану">Rōmaji</button>
                    </div>
                </div>
            </div>

            <div class="hotkeys-hint">
                <span><b>Space</b> <span data-i18n="hotkeys.space">пауза</span></span>
                <span><b>A</b> <span data-i18n="hotkeys.a">повторить реплику</span></span>
                <span><b>S</b> <span data-i18n="hotkeys.s">авто-пауза</span></span>
                <span><b>D</b> <span data-i18n="hotkeys.d">следующая</span></span>
                <span><b>F</b> <span data-i18n="hotkeys.f">весь экран</span></span>
                <span><b data-i18n="hotkeys.click">клик по слову</b> <span data-i18n="hotkeys.dict">словарь</span></span>
            </div>
        </section>

        <aside class="transcript" id="transcript">
            <div class="transcript__header">
                <span data-i18n="transcript.title">Субтитры</span>
                <div class="transcript__header-right">
                    <span class="transcript__source" id="subs-source"></span>
                    <button class="transcript__fix" id="subs-fix" type="button" hidden
                            data-i18n="subs.wrong" data-i18n-title="subs.wrong.title"
                            title="Субтитры не от этой серии? Выбрать другой файл">Не те?</button>
                </div>
            </div>
            <div class="transcript__list" id="transcript-list">
                <div class="transcript__status" id="subs-status" data-i18n="subs.searching">Ищем японские субтитры…</div>
            </div>
            <button class="transcript__jump" id="transcript-jump" type="button" hidden
                    data-i18n-title="subs.backToCurrent.title" title="Вернуться к текущей реплике">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M19 12l-7 7-7-7"/></svg>
                <span data-i18n="subs.backToCurrent">К текущей</span>
            </button>

            <!-- Ручной выбор субтитров: если авто-подбор ошибся серией/тайтлом -->
            <div class="subs-picker" id="subs-picker" hidden>
                <div class="subs-picker__head">
                    <span data-i18n="subs.picker.title">Выбрать субтитры вручную</span>
                    <button class="subs-picker__close" id="subs-picker-close" aria-label="Закрыть">✕</button>
                </div>
                <div class="subs-picker__search">
                    <input type="text" id="subs-picker-input" autocomplete="off"
                           data-i18n-placeholder="subs.picker.search" placeholder="Название аниме на латинице">
                </div>
                <div class="subs-picker__list" id="subs-picker-list"></div>
            </div>
        </aside>
    </main>

    <div class="word-popup" id="word-popup" hidden>
        <div class="word-popup__head">
            <div>
                <div class="word-popup__word" id="popup-word"></div>
                <div class="word-popup__reading" id="popup-reading"><span id="popup-reading-text"></span></div>
            </div>
            <button class="word-popup__close" id="popup-close" aria-label="Закрыть">✕</button>
        </div>
        <div class="word-popup__body" id="popup-body"></div>
        <div class="word-popup__sentence" id="popup-sentence"></div>
        <div class="word-popup__explain" id="popup-explain" hidden></div>
        <button class="word-popup__explain-btn" id="popup-explain-btn" hidden data-i18n="popup.explain">Разобрать предложение</button>
        <button class="word-popup__save" id="popup-save" data-i18n="popup.save">+ В коллекцию</button>
    </div>
</div>

<script src="../libs/axios/axios.min.js"></script>
<script src="../libs/snackbar/snackbar.js"></script>
<script src="../libs/hls/hls.min.js"></script>
<script src="../js/i18n.js"></script>
<script src="../js/speech.js"></script>
<script src="../js/axiosClient.js"></script>
<script src="../js/video-store.js"></script>
<script src="../js/words-store.js"></script>
<script src="../js/player.js"></script>
<script src="../js/player-ui.js"></script>
<script src="../js/stats.js"></script>
</body>
</html>
